# fly.toml app configuration file generated for trajectories-viewer on 2026-04-13T16:31:25-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trajectories-viewer'
primary_region = 'cdg'

[build]

[env]
  DATABASE_URL = 'sqlite:////data/viewer.db'

[[mounts]]
  source = 'viewer_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
